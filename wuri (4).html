.tab{padding:6px 11px;border-radius:8px;font-size:13px;font-weight:600;color:#8890b5;background:transparent;transition:all .2s}
.tab.on{background:#6c7bff;color:#fff}

.btn{padding:7px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:4px}

/* 테이블 */

.tbl th{font-size:10px;color:#8890b5;text-transform:uppercase;padding:7px 10px;text-align:left;background:#22263a;border-bottom:1px solid #2e3352;white-space:nowrap;font-weight:600}

// ── DOM 헬퍼 ────────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "class") el.className = v;
    else if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => {
    if (c == null || c === false) return;
    el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return el;
}
function txt(s) { return document.createTextNode(String(s||"")); }
function bdg(label) {
  const [bg,color] = (BDGMAP[label]||"rgba(136,144,181,.15)|#8890b5").split("|");
  return h("span",{class:"bdg",style:{background:bg,color}}, label);
}
function pbar(pct, color) {
  return h("div",{class:"pbar"}, h("div",{class:"pbar-fill",style:{width:Math.min(+pct||0,100)+"%",background:color||"#6c7bff"}}));
}
function btn(label, cls, onClick) {
  return h("button",{class:"btn "+cls, onClick}, label);
}

// ── 모달 ────────────────────────────────────────────────────
function openModal(content) {
  const bg = h("div",{class:"mo-bg", onClick: e => { if(e.target===bg) closeModal(); }}, content);
  document.body.appendChild(bg);
  modal = bg;
}
function closeModal() {
  if (modal) { modal.remove(); modal = null; }
}

function field(label, inputEl) {
  return h("div",{class:"field"}, h("label",{}, label), inputEl);
}
function inp(type, placeholder, value="") {
  const el = document.createElement("input");
  el.type = type; el.placeholder = placeholder||""; el.value = value||"";
  return el;
}
function sel(options, value="") {
  const el = document.createElement("select");
  options.forEach(o => {
    const opt = document.createElement("option");
    opt.value = o; opt.textContent = o;
    if (o === value) opt.selected = true;
    el.appendChild(opt);
  });
  return el;
}

  Object.entries(cats).forEach(([cat,val])=>{
    legend.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"5px"}},

    cards,

    ].forEach(td=>tr.appendChild(td));
    return tr;
  });
  const foot=document.createElement("tr");
  [
    h("td",{colspan:3,style:{padding:"8px 10px",fontSize:"11px",fontWeight:700,color:"#8890b5"}},"합계"),
    h("td",{style:{padding:"8px 10px",fontSize:"13px",fontWeight:700,color:"#6c7bff"}},fmt(tCv)),
    h("td",{style:{padding:"8px 10px",fontSize:"12px",color:"#8890b5"}},fmt(tOv)),
    h("td",{style:{padding:"8px 10px",fontSize:"12px",fontWeight:700,color:tG>=0?"#4caf88":"#ff6b8a"}},(tG>=0?"+":"")+fmt(tG)),
    h("td",{style:{padding:"8px 10px",fontSize:"11px",color:tG>=0?"#4caf88":"#ff6b8a"}},(tG>=0?"+":"")+fmt(tOv?(tG/tOv*100).toFixed(1):"0")+"%"),
    h("td",{})
  ].forEach(td=>foot.appendChild(td));
  foot.style.background="#22263a";foot.style.borderTop="2px solid #2e3352";
  const thead=h("thead",{},h("tr",{},...["소유주","자산명","분류","평가금액","매입금액","손익","수익률",""].map(t=>h("th",{},t))));
  const tbody=document.createElement("tbody");
  rows.forEach(r=>tbody.appendChild(r));
  const tfoot=h("tfoot",{},foot);
  const table=h("table",{class:"tbl"},thead,tbody,tfoot);
  return h("div",{class:"box"},
    h("div",{class:"bh"},h("div",{class:"bh-title"},"자산 목록"),h("div",{class:"bh-right"},btn("+ 추가","btn btn-p",()=>openAssetModal(null)))),
    table
  );
}

function renderLK() {
  const tm=toMon(),mx=D.txs.filter(t=>t.dt.slice(0,7)===tm);
  const inc=mx.filter(t=>t.tp==="income").reduce((s,t)=>s+t.am,0);
  const exp=mx.filter(t=>t.tp==="expense").reduce((s,t)=>s+t.am,0);
  const ec={};mx.filter(t=>t.tp==="expense").forEach(t=>{ec[t.ct]=(ec[t.ct]||0)+t.am;});
  const maxC=Math.max(...Object.values(ec),1);

  const summaryRows=[["수입","#4caf88","+"+fmt(inc)],["지출","#ff6b8a","-"+fmt(exp)],["잔여",inc-exp>=0?"#6c7bff":"#ff6b8a",(inc-exp>=0?"+":"")+fmt(inc-exp)]];

  const catBars=Object.entries(ec).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([ct,v])=>{
    const ci=EC.find(c=>c.k===ct)||{i:"📦",c:"#8890b5"};
    return h("div",{},
      h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"2px"}},
        h("span",{},ci.i+" "+ct),h("span",{style:{color:"#8890b5"}},fmt(v))
      ),
      pbar(v/maxC*100,ci.c)
    );
  });

  let flt="";
  const fltSel=h("select",{style:{padding:"4px 8px",background:"#22263a",border:"1px solid #2e3352",borderRadius:"7px",color:"#e8eaf6",fontSize:"11px"}},
    h("option",{value:""},"전체"),h("option",{value:"income"},"수입"),h("option",{value:"expense"},"지출")
  );
  const listWrap=h("div",{});
  function renderList(){
    listWrap.innerHTML="";
    const list=[...D.txs].sort((a,b)=>b.dt.localeCompare(a.dt)).filter(t=>!flt||t.tp===flt);
    if(!list.length){listWrap.appendChild(h("div",{style:{textAlign:"center",padding:"24px",color:"#8890b5",fontSize:"12px"}},"거래 없음"));return;}
    list.forEach(t=>{
      const ci=t.tp==="income"?IC.find(c=>c.k===t.ct):EC.find(c=>c.k===t.ct);
      const delB=btn("✕","btn-x",()=>{D.txs=D.txs.filter(x=>x.id!==t.id);saveToFB();render();});
      listWrap.appendChild(h("div",{class:"tx-item"},
        h("div",{class:"tx-icon",style:{background:t.tp==="income"?"rgba(76,175,136,.15)":"rgba(255,107,138,.15)"}},ci?.i||"📦"),
        h("div",{style:{flex:1}},
          h("div",{style:{fontSize:"12px",fontWeight:600}},t.nm,t.mm?h("span",{style:{fontSize:"10px",color:"#8890b5"}}," ("+t.mm+")"):""),
          h("div",{style:{fontSize:"10px",color:"#8890b5"}},t.dt+" · "+t.ct)
        ),
        h("div",{style:{display:"flex",alignItems:"center",gap:"7px"}},
          h("span",{style:{fontSize:"12px",fontWeight:700,color:t.tp==="income"?"#4caf88":"#ff6b8a"}},(t.tp==="income"?"+":"-")+fmt(t.am)),
          delB
        )
      ));
    });
  }
  fltSel.addEventListener("change",e=>{flt=e.target.value;renderList();});
  renderList();

  return h("div",{},
    h("div",{class:"grid2"},
      h("div",{class:"box",style:{marginBottom:0}},
        h("div",{class:"bh"},h("div",{class:"bh-title"},"이번 달")),
        h("div",{style:{padding:"13px"}},
          ...summaryRows.map(([l,c,v],i,arr)=>
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<arr.length-1?"1px solid #2e3352":"none"}},
              h("span",{style:{fontSize:"12px",color:"#8890b5"}},l),
              h("span",{style:{fontSize:"13px",fontWeight:700,color:c}},v)
            )
          )
        )
      ),
      h("div",{class:"box",style:{marginBottom:0}},
        h("div",{class:"bh"},h("div",{class:"bh-title"},"지출 분류")),
        h("div",{style:{padding:"11px",display:"flex",flexDirection:"column",gap:"7px"}},
          catBars.length?catBars:h("div",{style:{color:"#8890b5",fontSize:"12px",textAlign:"center",padding:"10px"}},"지출 없음")
        )
      )
    ),
    h("div",{style:{height:"14px"}}),
    h("div",{class:"box"},
      h("div",{class:"bh"},
        h("div",{class:"bh-title"},"거래 내역"),
        h("div",{class:"bh-right"},fltSel,btn("+ 추가","btn btn-p",openTxModal))
      ),
      listWrap
    )
  );
}

function renderLN() {
  const tbl=D.loans.reduce((s,l)=>s+l.bl,0),tog=D.loans.reduce((s,l)=>s+l.og,0),tmy=D.loans.reduce((s,l)=>s+l.my,0);
  const loanItems=D.loans.map(l=>{
    const p=l.og?((l.og-l.bl)/l.og*100).toFixed(0):0;
    const editB=btn("✏️","btn-e",()=>openLoanModal(l));
    const delB=btn("✕","btn-x",()=>{D.loans=D.loans.filter(x=>x.id!==l.id);saveToFB();render();});
    return h("div",{style:{padding:"12px 15px",borderBottom:"1px solid rgba(46,51,82,.3)"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}},
        h("div",{},h("div",{style:{fontSize:"13px",fontWeight:600,marginBottom:"4px"}},l.nm),bdg(l.ct)),
        h("div",{style:{display:"flex",gap:"5px",alignItems:"center"}},
          h("div",{style:{fontSize:"14px",fontWeight:700,color:"#ff6b8a"}},fmt(l.bl)),editB,delB
        )
      ),
      h("div",{style:{display:"flex",gap:"14px",fontSize:"11px",color:"#8890b5",marginBottom:"5px"}},
        h("span",{},"금리 "+l.rt+"%"),h("span",{},"월상환 "+fmt(l.my)),h("span",{},"만기 "+(l.du||"-"))
      ),
      pbar(p,"#6c7bff"),
      h("div",{style:{fontSize:"10px",color:"#8890b5",marginTop:"2px"}},p+"% 상환")
    );
  });
  return h("div",{},
    h("div",{class:"box"},
      h("div",{class:"bh"},h("div",{class:"bh-title"},"대출·부채"),h("div",{class:"bh-right"},btn("+ 추가","btn btn-p",()=>openLoanModal(null)))),
      D.loans.length?loanItems:h("div",{style:{textAlign:"center",padding:"28px",color:"#8890b5",fontSize:"12px"}},"대출 정보를 추가해주세요")
    ),
    h("div",{class:"grid2"},
      h("div",{class:"box",style:{marginBottom:0}},
        h("div",{class:"bh"},h("div",{class:"bh-title"},"부채 현황")),
        h("div",{style:{padding:"13px",display:"flex",flexDirection:"column",gap:"10px"}},
          ...[["총 잔액",fmt(tbl),"#ff6b8a"],["월 상환",fmt(tmy)+"/월",""],["상환 완료",fmt(tog-tbl),"#4caf88"]].map(([l,v,c])=>
            h("div",{style:{display:"flex",justifyContent:"space-between"}},
              h("span",{style:{color:"#8890b5",fontSize:"12px"}},l),
              h("span",{style:{fontWeight:700,color:c||"#e8eaf6",fontSize:"12px"}},v)
            )
          )
        )
      ),
      h("div",{class:"box",style:{marginBottom:0}},
        h("div",{class:"bh"},h("div",{class:"bh-title"},"상환률")),
        h("div",{style:{padding:"13px",display:"flex",flexDirection:"column",gap:"8px"}},
          D.loans.length
            ? D.loans.map(l=>{const p=l.og?((l.og-l.bl)/l.og*100).toFixed(0):0;return h("div",{},h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"2px"}},h("span",{style:{color:"#8890b5"}},l.nm),h("span",{style:{color:"#6c7bff"}},p+"%")),pbar(p));})
            : h("div",{style:{color:"#8890b5",fontSize:"12px",textAlign:"center",padding:"10px"}},"대출 없음")
        )
      )
    )
  );
}

function renderGL() {
  const cards=D.goals.map((g,i)=>{
    const pct=g.tg?Math.min(g.cv/g.tg*100,100).toFixed(0):0,col=GCOLS[i%GCOLS.length];
    const editB=btn("✏️","btn-e",()=>openGoalModal(g));
    const delB=btn("✕","btn-x",()=>{D.goals=D.goals.filter(x=>x.id!==g.id);saveToFB();render();});
    return h("div",{class:"goal-card"},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"7px"}},
        h("div",{},h("div",{style:{fontSize:"13px",fontWeight:600}},g.nm),h("div",{style:{fontSize:"10px",color:"#8890b5",marginTop:"1px"}},g.dt||"기한 미설정")),
        h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px"}},
          h("div",{style:{fontSize:"17px"}},g.em||"🎯"),
          h("div",{style:{display:"flex",gap:"3px"}},editB,delB)
        )
      ),
      h("div",{style:{fontSize:"18px",fontWeight:700,color:col}},pct+"%"),
      pbar(pct,col),
      h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"10px",color:"#8890b5",marginTop:"5px"}},
        h("span",{},fmt(g.cv)),h("span",{},"목표 "+fmt(g.tg))
      )
    );
  });
  return h("div",{},
    h("div",{style:{display:"flex",justifyContent:"flex-end",marginBottom:"10px"}},btn("+ 목표 추가","btn btn-p",()=>openGoalModal(null))),
    h("div",{class:"grid2"},...cards)
  );
}

function renderFX() {
  const now=new Date(),ym=toMon();
  const fixed=D.fixed||[];
  const total=fixed.reduce((s,f)=>s+f.am,0);
  const items=fixed.map(fx=>{
    const applied=D.txs.some(t=>t.fixedId===fx.id&&t.dt.slice(0,7)===ym);
    const dueDate=new Date(now.getFullYear(),now.getMonth(),fx.day);
    const pending=!applied&&now<dueDate;
    const ci=EC.find(c=>c.k===fx.ct)||{i:"📦"};
    let statusEl;
    if(applied) statusEl=h("span",{style:{fontSize:"11px",color:"#4caf88",background:"rgba(76,175,136,.12)",padding:"2px 8px",borderRadius:"20px"}},"✅ 적용됨");
    else if(pending) statusEl=h("span",{style:{fontSize:"11px",color:"#ffd166",background:"rgba(255,209,102,.12)",padding:"2px 8px",borderRadius:"20px"}},"⏳ "+fx.day+"일 예정");
    else {
      statusEl=h("button",{style:{fontSize:"11px",color:"#6c7bff",background:"rgba(108,123,255,.15)",padding:"2px 8px",borderRadius:"20px",border:"none",cursor:"pointer"}},"지금 적용");
      statusEl.addEventListener("click",()=>{
        const dt=ym+"-"+String(fx.day).padStart(2,"0");
        D.txs.push({id:D.nid++,tp:"expense",nm:fx.nm,ct:fx.ct,am:fx.am,dt,mm:"고정",fixed:true,fixedId:fx.id});
        saveToFB();render();
      });
    }
    const editB=btn("✏️","btn-e",()=>openFixedModal(fx));
    const delB=btn("✕","btn-x",()=>{D.fixed=D.fixed.filter(x=>x.id!==fx.id);saveToFB();render();});
    return h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"10px 15px",borderBottom:"1px solid rgba(46,51,82,.3)"}},
      h("div",{class:"tx-icon",style:{background:"rgba(255,107,138,.15)"}},ci.i),
      h("div",{style:{flex:1}},
        h("div",{style:{fontSize:"13px",fontWeight:600}},fx.nm),
        h("div",{style:{fontSize:"11px",color:"#8890b5",marginTop:"2px"}},fx.ct+" · 매월 "+fx.day+"일 · "+fmt(fx.am))
      ),
      h("div",{style:{display:"flex",gap:"5px",alignItems:"center"}},statusEl,editB,delB)
    );
  });
  return h("div",{},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},
      h("div",{style:{fontSize:"11px",color:"#8890b5"}},"매달 자동으로 가계부에 추가돼요"),
      btn("+ 추가","btn btn-p",()=>openFixedModal(null))
    ),
    h("div",{class:"box"},
      h("div",{class:"bh"},h("div",{class:"bh-title"},"고정비용 목록")),
      fixed.length?items:h("div",{style:{textAlign:"center",padding:"28px",color:"#8890b5",fontSize:"12px"}},"고정비용을 추가해주세요"),
      h("div",{style:{padding:"9px 15px",background:"rgba(108,123,255,.06)",borderTop:"1px solid #2e3352",display:"flex",justifyContent:"space-between",fontSize:"12px"}},
        h("span",{style:{color:"#8890b5"}},"월 고정 지출 합계"),
        h("span",{style:{fontWeight:700,color:"#ff6b8a"}},fmt(total))
      )
    )
  );
}

// ── 메인 렌더 ────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const TABS=[["ov","📊"],["as","🏠"],["lk","📒"],["fx","🔁"],["ln","💳"],["gl","🎯"]];
  const TLBL={"ov":"대시보드","as":"자산현황","lk":"가계부","fx":"고정비용","ln":"대출","gl":"목표"};

  // NAV
  const tabs=h("div",{class:"tabs"});
  TABS.forEach(([k,ico])=>{
    const b=h("button",{class:"tab"+(currentTab===k?" on":"")},ico);
    b.addEventListener("click",()=>{ currentTab=k; render(); });
    tabs.appendChild(b);
  });
  const nav=h("div",{class:"nav"},
    h("div",{style:{display:"flex",alignItems:"center"}},
      h("span",{class:"nav-title"},"우리집 자산관리"),
      h("span",{class:"nav-sync"},fbReady ? "🔥 실시간 공유중" : "💾 로컬저장")
    ),
    tabs
  );
  app.appendChild(nav);

  // PAGE
  const page=h("div",{class:"page"},
    h("div",{class:"page-title"},TLBL[currentTab]||"")
  );
  if(currentTab==="ov") page.appendChild(renderOV());
  else if(currentTab==="as") page.appendChild(renderAS());
  else if(currentTab==="lk") page.appendChild(renderLK());
  else if(currentTab==="ln") page.appendChild(renderLN());
  else if(currentTab==="gl") page.appendChild(renderGL());
  else if(currentTab==="fx") page.appendChild(renderFX());
  app.appendChild(page);

  // 고정비용 자동 적용
  const now=new Date(),ym=toMon();
  if(D.fixed&&D.fixed.length>0){
    let changed=false;
    D.fixed.forEach(fx=>{
      const already=D.txs.some(t=>t.fixedId===fx.id&&t.dt.slice(0,7)===ym);
      const dueDate=new Date(now.getFullYear(),now.getMonth(),fx.day);
      if(!already&&now>=dueDate){
        D.txs.push({id:D.nid++,tp:"expense",nm:fx.nm,ct:fx.ct,am:fx.am,dt:ym+"-"+String(fx.day).padStart(2,"0"),mm:"고정",fixed:true,fixedId:fx.id});
        changed=true;
      }
    });
    if(changed) saveToFB();
  }
}

render();
</script>

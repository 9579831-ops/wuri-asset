function mk(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt)e.textContent=txt;return e;}

function pbar(pct,col){var d=mk("div","pb");var f=mk("div","pbf");f.style.width=Math.min(Math.max(+pct||0,0),100)+"%";f.style.background=col||"#6c7bff";ap(d,f);return d;}

function ni(ph,val){var i=mk("input");i.type="number";i.placeholder=ph||"0";i.value=val||"";return i;}
function ti(ph,val){var i=mk("input");i.type="text";i.placeholder=ph||"";i.value=val||"";return i;}
function di(val){var i=mk("input");i.type="date";i.value=val||"";return i;}
function sl(opts,val){var s=mk("select");opts.forEach(function(o){var op=mk("option");op.value=o;op.textContent=o;if(o===val)op.selected=true;s.appendChild(op);});return s;}

function catBtns(list,cur,onChange){
  var w=mk("div","cw");
  list.forEach(function(c){
    var b=mk("button","cb"+(c.k===cur?" on":""),c.i+" "+c.k);
    if(c.k===cur)b.style.background=c.c;
    b.onclick=function(){onChange(c.k);};
    ap(w,b);
  });
  return w;
}
function ecatBtns(cur,onChange){
  var w=mk("div");
  var gs=[];EC.forEach(function(c){if(gs.indexOf(c.g)<0)gs.push(c.g);});
  gs.forEach(function(g){
    ap(w,mk("div","gl",g));
    var row=mk("div","cw");
    EC.filter(function(c){return c.g===g;}).forEach(function(c){
      var b=mk("button","cb"+(c.k===cur?" on":""),c.i+" "+c.k);
      if(c.k===cur)b.style.background=c.c;
      b.onclick=function(){onChange(c.k);};
      ap(row,b);
    });
    ap(w,row);
  });
  return w;
}

function renderTabs(){

}
